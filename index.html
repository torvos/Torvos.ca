<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torvos.ca</title>
    <meta name="description" content="Torvos Personal Infrastructure">

    <link rel="stylesheet" href="css/terminal.css">
    <link rel="stylesheet" href="css/animations.css">

</head>

<body class="theme-green">

<div id="terminal-container">
    <main id="terminal">
        <div id="output"></div>
        <div id="input-line">
            <span id="prompt"></span>
            <span id="command"></span>
        </div>
        <div id="scroll-anchor"></div>
    </main>
</div>

<input
    id="hidden-input"
    type="text"
    autocomplete="off"
    autocorrect="off"
    autocapitalize="off"
    spellcheck="false"
/>

<script>
window.TorvosConfig = {
    hostname: "torvos",
    username: "guest"
};
</script>

<script src="js/filesystem.js"></script>
<script src="js/commands.js"></script>
<script src="js/terminal.js"></script>
<script src="js/app.js"></script>

</body>
</html>
